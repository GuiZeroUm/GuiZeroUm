name: Update contribution farm

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    branches:
      - main
    paths:
      - "assets/farm-base.png"
      - "scripts/generate_farm.py"
      - ".github/workflows/update-farm.yml"

permissions:
  contents: write

concurrency:
  group: contribution-farm
  cancel-in-progress: true

jobs:
  update-farm:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install renderer
        run: python -m pip install --upgrade pillow

      - name: Render the real contribution farm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: GuiZeroUm
        run: python scripts/generate_farm.py

      - name: Commit the refreshed harvest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/farm-contributions.svg assets/farm-meta.json

          if git diff --cached --quiet; then
            echo "The farm is already up to date."
            exit 0
          fi

          git commit -m "chore: refresh contribution farm"
          git push
